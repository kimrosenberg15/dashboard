name: Refresh & Sync CLAUDE.md

on:
  push:
    branches: [main]
    paths: [CLAUDE.md]
  schedule:
    - cron: '0 10 * * *'  # daily 6am ET
  workflow_dispatch:

jobs:
  refresh-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Stamp refresh date in CLAUDE.md
        if: github.event_name != 'push'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s/_Last auto-refreshed: .*/_Last auto-refreshed: $TODAY. Do not edit manually._/" CLAUDE.md

      - name: Commit if changed
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          git diff --staged --quiet && echo "No change" || (git commit -m "chore: refresh CLAUDE.md date [skip ci]" && git push)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google API client
        run: pip install google-api-python-client google-auth

      - name: Sync CLAUDE.md to Google Doc
        env:
          GDOCS_SERVICE_ACCOUNT: ${{ secrets.GDOCS_SERVICE_ACCOUNT }}
        run: |
          python - <<'PYEOF'
          import json, os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          DOC_ID = "1SRwL96QrLvGWPNbe4wrxfBR1KXvhDURbfguapzbJ-M8"

          key_data = json.loads(os.environ["GDOCS_SERVICE_ACCOUNT"])
          creds = service_account.Credentials.from_service_account_info(
              key_data,
              scopes=["https://www.googleapis.com/auth/documents"]
          )
          service = build("docs", "v1", credentials=creds)

          with open("CLAUDE.md", "r") as f:
              content = f.read()

          doc = service.documents().get(documentId=DOC_ID).execute()
          body_content = doc.get("body", {}).get("content", [])
          end_index = body_content[-1].get("endIndex", 1) if body_content else 1

          requests = []
          if end_index > 1:
              requests.append({
                  "deleteContentRange": {
                      "range": {"startIndex": 1, "endIndex": end_index - 1}
                  }
              })
          requests.append({
              "insertText": {
                  "location": {"index": 1},
                  "text": content
              }
          })

          service.documents().batchUpdate(
              documentId=DOC_ID,
              body={"requests": requests}
          ).execute()

          print("Synced CLAUDE.md to Google Doc successfully.")
          PYEOF
