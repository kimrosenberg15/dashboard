name: Refresh CLAUDE.md

on:
  schedule:
    - cron: '0 10 * * *'  # daily 6am ET
  workflow_dispatch:       # on-demand via Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Stamp refresh date in CLAUDE.md
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s/_Last auto-refreshed: .*/_Last auto-refreshed: $TODAY. Do not edit manually._/" CLAUDE.md

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          git diff --staged --quiet && echo "No change" || (git commit -m "chore: refresh CLAUDE.md date [skip ci]" && git push)
